<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Showcase Indonesian Scholars International Convention</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #2b2b2b;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: hidden;
  }
  #wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
  }
  h1 {
    color: #eee;
    font-size: 16px;
    font-weight: 500;
    margin: 12px 0;
    letter-spacing: 0.5px;
    text-align: center;
    padding: 0 20px;
  }
  #book-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  #book { box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
  #book img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .side-arrow {
    background: rgba(255,255,255,0.08);
    color: #fff;
    border: none;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .side-arrow:hover { background: rgba(255,255,255,0.2); }
  .controls { margin-top: 14px; display: flex; gap: 10px; }
  .controls button {
    background: #444;
    color: #fff;
    border: none;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
  }
  .controls button:hover { background: #666; }
  @media (max-width: 700px) {
    .side-arrow { width: 36px; height: 36px; font-size: 16px; }
  }
</style>
</head>
<body>
<div id="wrapper">
  <h1>Research Showcase Indonesian Scholars International Convention</h1>
  <div id="book-row">
    <button class="side-arrow" onclick="pageFlip.flipPrev()" aria-label="Halaman sebelumnya">‹</button>
    <div id="book"></div>
    <button class="side-arrow" onclick="pageFlip.flipNext()" aria-label="Halaman berikutnya">›</button>
  </div>
  <div class="controls">
    <button onclick="pageFlip.flipPrev()">‹ Sebelumnya</button>
    <button onclick="pageFlip.flipNext()">Berikutnya ›</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script>
  const TOTAL_PAGES = 38;
  const pageImages = Array.from({ length: TOTAL_PAGES }, (_, i) => `page-${i + 1}.png`);

  const bookEl = document.getElementById("book");
  pageImages.forEach(src => {
    const page = document.createElement("div");
    page.className = "page";
    const img = document.createElement("img");
    img.src = src;
    page.appendChild(img);
    bookEl.appendChild(page);
  });

  const pageFlip = new St.PageFlip(bookEl, {
    width: 400,
    height: 566,
    size: "stretch",
    minWidth: 300,
    maxWidth: 900,
    minHeight: 400,
    maxHeight: 1200,
    maxShadowOpacity: 0.5,
    showCover: true,
    mobileScrollSupport: true
  });

  pageFlip.loadFromHTML(document.querySelectorAll(".page"));
</script>
</body>
</html>
